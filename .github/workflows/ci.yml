name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Typecheck & bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Metro bundle for both platforms — catches babel / NativeWind / Reanimated
      # / import-resolution errors that a typecheck alone cannot.
      - name: Bundle (iOS)
        run: npx expo export --platform ios --output-dir dist-ios

      - name: Bundle (Android)
        run: npx expo export --platform android --output-dir dist-android
